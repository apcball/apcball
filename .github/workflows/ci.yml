name: Odoo CI

on:
  push:
    branches: [Docker_Ball]
  pull_request:
    branches: [Docker_Ball]

jobs:
  detect-changes:
    runs-on: self-hosted
    outputs:
      modules: ${{ steps.detect.outputs.modules }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -oP '^[a-z][a-z0-9_]+(?=/)' | sort -u | tr '\n' ' ')
          echo "modules=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "Detected modules: $CHANGED"

  lint:
    needs: detect-changes
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Ensure lint tools
        run: |
          if ! command -v pylint &> /dev/null; then
            pip3 install pylint pylint-odoo 2>/dev/null || true
          fi
      - name: Lint changed modules
        run: |
          for mod in ${{ needs.detect-changes.outputs.modules }}; do
            if [ -d "$mod" ]; then
              echo "=== Linting $mod ==="
              pylint --load-plugins=pylint_odoo "$mod/" || true
            else
              echo "=== Skip lint $mod (directory not found) ==="
            fi
          done

  test:
    needs: [detect-changes, lint]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Run Tests in Isolated Container
        run: |
          MODULES="${{ needs.detect-changes.outputs.modules }}"
          if [ -z "$MODULES" ]; then
            echo "No modules detected, skipping tests."
            exit 0
          fi

          # Odoo entrypoint.sh appends DB_ARGS AFTER user CLI args,
          # and the last arg wins. So we must pass HOST/USER/PASSWORD
          # as environment variables instead of --db_* CLI flags.
          for mod in $MODULES; do
            if [ ! -d "$mod" ]; then
              echo "=== Skip $mod (directory not found) ==="
              continue
            fi

            echo "=== Testing $mod ==="

            docker run --rm \
              --network backend \
              -e HOST=postgres \
              -e PORT=5432 \
              -e USER=odoo \
              -e PASSWORD=odoo_password_placeholder \
              -v /srv/docker/odoo/custom-addons:/mnt/custom-addons:ro \
              -v /srv/docker/odoo/data:/var/lib/odoo \
              my-odoo:17 \
              -d MOG_DEV \
              --addons-path=/mnt/custom-addons \
              -u "$mod" \
              --test-enable \
              --test-tags "/$mod" \
              --stop-after-init \
              --no-http

            EXIT_CODE=$?
            if [ $EXIT_CODE -ne 0 ]; then
              echo "=== FAILED: $mod (exit $EXIT_CODE) ==="
              exit $EXIT_CODE
            fi
            echo "=== PASSED: $mod ==="
          done

  deploy_staging:
    needs: test
    runs-on: self-hosted
    if: github.ref == 'refs/heads/Docker_Ball'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Staging
        run: |
          for mod in ${{ needs.detect-changes.outputs.modules }}; do
            if [ -d "$mod" ]; then
              echo "=== Deploying $mod ==="
              docker cp "./$mod" odoo:/mnt/custom-addons/
              docker exec odoo odoo -d MOG_DEV \
                -u "$mod" \
                --stop-after-init \
                --no-http
            fi
          done
