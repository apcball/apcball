name: Odoo CI

on:
  push:
    branches: [Docker_Ball]
  pull_request:
    branches: [Docker_Ball]

jobs:
  detect-changes:
    runs-on: self-hosted
    outputs:
      modules: ${{ steps.detect.outputs.modules }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -oP '^[a-z_]+(?=/)' | sort -u | tr '\n' ' ')
          echo "modules=$CHANGED" >> $GITHUB_OUTPUT

  lint:
    needs: detect-changes
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Cache lint tools
        id: cache-pip
        run: |
          if ! command -v pylint &> /dev/null; then
            pip3 install pylint pylint-odoo 2>/dev/null || true
          fi
      - name: Lint changed modules
        run: |
          for mod in ${{ needs.detect-changes.outputs.modules }}; do
            echo "=== Linting $mod ==="
            pylint --load-plugins=pylint_odoo $mod/ || true
          done

  test:
    needs: [detect-changes, lint]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Run Tests in Isolated Container
        run: |
          # Create minimal config that points to localhost
          cat > /tmp/odoo_test.conf << 'EOF'
          [options]
          db_host = localhost
          db_port = 5432
          db_user = odoo
          db_password = odoo
          addons_path = /mnt/extra-addons
          EOF
          for mod in ${{ needs.detect-changes.outputs.modules }}; do
            echo "=== Testing $mod ==="
            docker run --rm \
              --network=host \
              -v ${{ github.workspace }}/${mod}:/mnt/extra-addons/${mod} \
              -v /tmp/odoo_test.conf:/etc/odoo/odoo.conf:ro \
              my-odoo:17 \
              -d MOG_DEV \
              -u ${mod} \
              --test-enable \
              --stop-after-init \
              --no-http
          done

  deploy_staging:
    needs: test
    runs-on: self-hosted
    if: github.ref == 'refs/heads/Docker_Ball'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Staging
        run: |
          for mod in ${{ needs.detect-changes.outputs.modules }}; do
            echo "=== Deploying $mod ==="
            docker cp ./$mod odoo:/mnt/extra-addons/
            docker exec odoo odoo -d MOG_DEV \
              -u $mod \
              --stop-after-init \
              --no-http
          done
