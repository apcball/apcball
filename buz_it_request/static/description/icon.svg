<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background Gradient (Glow IT) -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/> <!-- Blue 500 -->
      <stop offset="100%" stop-color="#4F46E5"/> <!-- Indigo 600 -->
    </linearGradient>

    <!-- Ticket Glow Inner Gradient -->
    <linearGradient id="ticket-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E0E7FF" />
    </linearGradient>

    <!-- Shadow filter for floating key elements -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background Squircle (Apple iOS Style) -->
  <rect x="4" y="4" width="120" height="120" rx="30" ry="30" fill="url(#bg-grad)"/>

  <!-- Subtle grid lines for high-tech aesthetic background -->
  <g opacity="0.08" stroke="#FFFFFF" stroke-width="1.5">
    <line x1="28" y1="4" x2="28" y2="124" />
    <line x1="64" y1="4" x2="64" y2="124" />
    <line x1="100" y1="4" x2="100" y2="124" />
    <line x1="4" y1="28" x2="124" y2="28" />
    <line x1="4" y1="64" x2="124" y2="64" />
    <line x1="4" y1="100" x2="124" y2="100" />
  </g>

  <!-- Laptop / Screen Frame (Representing IT Department / IT Support Portal) -->
  <!-- We make this extremely minimal and elegant -->
  <g filter="url(#glow)">
    <!-- Stand / Dock Base -->
    <path d="M 50,88 L 78,88 L 74,100 L 54,100 Z" fill="#FFFFFF" opacity="0.85"/>
    <rect x="42" y="100" width="44" height="4" rx="2" fill="#FFFFFF"/>

    <!-- Device Frame -->
    <rect x="22" y="24" width="84" height="60" rx="6" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linejoin="round"/>
    
    <!-- Screen Bottom Border Bar containing indicator logic -->
    <path d="M 22,78 L 106,78" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
    <!-- Webcam -->
    <circle cx="64" cy="29" r="1.5" fill="#FFFFFF" opacity="0.7"/>
    <!-- Power Light -->
    <circle cx="64" cy="81.5" r="1" fill="#FFFFFF" opacity="0.8"/>
  </g>

  <!-- Floating Ticket/Request Bubble (Top-Right) -->
  <!-- Represents: Service Desk / IT Ticket / Helpdesk Request -->
  <g filter="url(#glow)">
    <!-- Ticket / Chat Bubble Main body -->
    <rect x="58" y="16" width="50" height="46" rx="10" fill="url(#ticket-grad)"/>
    
    <!-- Dynamic Accent "I.T." Icon or Bolt/Wrench on Request Bubble -->
    <!-- Let's put a gorgeous micro-wrench or setting gear inside -->
    <circle cx="70" cy="28" r="4" fill="none" stroke="#4F46E5" stroke-width="2"/>
    <line x1="73" y1="31" x2="78" y2="36" stroke="#4F46E5" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Lines symbolizing the request text/details -->
    <line x1="82" y1="26" x2="100" y2="26" stroke="#4F46E5" stroke-width="3" stroke-linecap="round"/>
    <line x1="82" y1="33" x2="94" y2="33" stroke="#818CF8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="70" y1="41" x2="100" y2="41" stroke="#A5B4FC" stroke-width="2" stroke-linecap="round"/>
    <line x1="70" y1="47" x2="88" y2="47" stroke="#A5B4FC" stroke-width="2" stroke-linecap="round"/>

    <!-- Small cute notification point on the ticket -->
    <circle cx="106" cy="18" r="4.5" fill="#EF4444"/>
  </g>
</svg>
