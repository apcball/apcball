<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#4A90E2" stroke="#2E5BBA" stroke-width="2"/>
  
  <!-- Shopping cart icon -->
  <g fill="white">
    <!-- Cart body -->
    <rect x="30" y="45" width="35" height="25" rx="3" fill="none" stroke="white" stroke-width="2"/>
    <!-- Cart handle -->
    <path d="M25 40 L30 40 L35 65 L75 65" fill="none" stroke="white" stroke-width="2"/>
    <!-- Cart wheels -->
    <circle cx="40" cy="75" r="4" fill="white"/>
    <circle cx="60" cy="75" r="4" fill="white"/>
  </g>
  
  <!-- Money/Settlement symbol -->
  <g fill="#FFD700">
    <!-- Dollar sign -->
    <text x="75" y="50" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFD700">$</text>
    <!-- Coins -->
    <circle cx="85" cy="35" r="8" fill="#FFD700" stroke="#FFA500" stroke-width="1"/>
    <circle cx="95" cy="42" r="6" fill="#FFD700" stroke="#FFA500" stroke-width="1"/>
  </g>
  
  <!-- Settlement arrows -->
  <g stroke="white" stroke-width="2" fill="none">
    <path d="M45 25 L55 25 M50 20 L55 25 L50 30"/>
    <path d="M75 95 L85 95 M80 90 L85 95 L80 100"/>
  </g>
</svg>
